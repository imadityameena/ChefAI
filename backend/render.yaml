services:
  - type: web
    name: recipe-generator-api
    runtime: node
    startCommand: npm start
    buildCommand: npm install
    plan: free
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://chef-ai-xqr8.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-db
          property: connectionString
      - key: GEMINI_API_KEY
        scope: build
        isStatic: false
      - key: JWT_SECRET
        scope: build
        isStatic: false

databases:
  - name: recipe-db
    databaseName: recipe_generator
    user: postgres_user
    plan: free
    postgresMajorVersion: "15"
