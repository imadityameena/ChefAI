services:
  - type: web
    name: recipe-generator-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && node migrate.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://chef-ai-xqr8.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: recipe-db
    databaseName: recipe_generator
    user: postgres
    plan: free
